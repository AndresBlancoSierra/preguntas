<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Jenga Questions</title>

  <!-- Highlight.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

  <!-- Tu CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="app">

    <!-- CONTROLES -->
    <div class="controles">

    <div class="lenguajes">
      <button id="btnPython" class="boton">
        <img src="assets/python.png">
      </button>

      <button id="btnJava" class="boton">
        <img src="assets/java.png">
      </button>
    </div>

    <div class="score-top">
      <div id="btnRojo" class="punto rojo">0</div>
      <div class="separador">|</div>
      <div id="btnAzul" class="punto azul">0</div>
    </div>

  </div>

    <!-- CONTENIDO -->
    <main class="contenido">
      <pre>
        <code id="codigo" class="language-python"></code>
      </pre>
    </main>

  </div>

  <!-- highlight -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- DATA PYTHON -->
  <script src="data/preguntasOpLogicos.js"></script>
  <script src="data/preguntasSalidaCodigo.js"></script>
  <script src="data/preguntasErrores.js"></script>

  <!-- DATA JAVA -->
  <script src="data/preguntasOpLogicosJava.js"></script>
  <script src="data/preguntasSalidaCodigoJava.js"></script>
  <script src="data/preguntasErroresJava.js"></script>

  <!-- APP -->
  <script src="app.js"></script>

</body>
</html>
